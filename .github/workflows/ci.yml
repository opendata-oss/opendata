name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      vector: ${{ steps.filter.outputs.vector }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vector:
              - 'common/**'
              - 'macros/**'
              - 'vector/**'
              - '.github/**'
              - '*'

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test --all --all-features

      - name: Check documentation builds
        run: cargo doc --all --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Run doc tests
        run: cargo test --doc --all

  quickstart-vector-smoke-test:
    needs: changes
    if: needs.changes.outputs.vector == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - uses: actions/checkout@v4

      - name: Run vector quickstart smoke test
        run: ./vector/quickstart/smoke_test.sh
