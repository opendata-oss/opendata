# Scenario A — Cardinality scaling (RFC 0006 centerpiece), session model.
#
# Scale `key_cardinality` 1K -> 100K -> 1M at a FIXED offered read load
# (`session_rate`, the global open-loop rate at which sessions wake) and a fixed
# aggregate write rate (`key_cardinality * arrival_rate_per_key` ~= 5000/s, held
# by scaling the per-key arrival rate DOWN as cardinality grows). The thesis: the
# sustainable number of concurrently active sessions, and per-session progress,
# stay approximately flat as the population grows — a million logs cost no more
# concurrent readers to follow than a thousand.
#
# Why this holds: at a fixed session rate and fixed aggregate write rate, the
# backlog a session wakes with is ~= aggregate_writes / session_rate, which is
# INDEPENDENT of cardinality. So per-session work (and thus mean occupancy, by
# Little's law) stays constant in N; what grows is the wall-clock gap between a
# key's visits, spreading that same backlog across more sealed segments — the
# segment fan-out (GETs/poll) effect the storage metrics surface.
#
# `max_active_sessions` is set generously (4096) so it does NOT bind: occupancy is
# emergent (mean_active_sessions << ceiling here) and the aggregate-goodput knee,
# not the ceiling, is what defines "sustainable". To find the knee, sweep
# `session_rate` up at a fixed cardinality until aggregate goodput plateaus and
# `session_sched_lag_us` diverges; this file fixes the rate and varies N instead.
#
# How to run:
#   cargo run -p log-bench --release -- \
#       --config log/bench/configs/scenario-a-cardinality.toml \
#       --benchmark follow --duration 600
#
# The `--duration` is the MEASURE window and applies to every point. At high
# cardinality a given key is visited rarely, so run long enough to accumulate many
# sessions per backlog bucket (a few hundred seconds at the 1M point). To run a
# single point, comment out the others.
#
# Console summary headlines: `mean_active_sessions` / `peak_active_sessions`
# (occupancy), `aggregate_goodput_records_per_sec` (the knee axis), per-backlog
# `db_rate_*` / `catchup_rate_*` / `time_to_catchup_ms_*` (session progress), and
# `session_sched_lag_us_*` (the hard-saturation backstop). Per-poll service latency
# bucketed by lag (`poll_service_us`) and GET activity are also emitted; the fuller
# per-bucket histograms require a configured `[reporter]`.
#
# Storage: SlateDB over an in-memory object store, so the real LSM read path
# (segments/blocks) is exercised with deterministic, S3-variance-free behavior.

[data.storage]
type = "SlateDb"
path = "follow-scenario-a"

[data.storage.object_store]
type = "InMemory"

# --- 1K keys: 5 arrivals/s/key -> ~5K/s aggregate writes ---
[[params.follow]]
key_cardinality = "1000"
key_length = "16"
value_size = "128"
page_size = "32"
arrival_rate_per_key = "5.0"
session_rate = "1000.0"
max_active_sessions = "4096"
session_duration_ms = "100"
poll_interval_ms = "10"
prefill_per_key = "32"
prefill_concurrency = "16"
warmup_secs = "2"
num_writer_tasks = "4"

# --- 100K keys: 0.05 arrivals/s/key -> ~5K/s aggregate writes ---
[[params.follow]]
key_cardinality = "100000"
key_length = "16"
value_size = "128"
page_size = "32"
arrival_rate_per_key = "0.05"
session_rate = "1000.0"
max_active_sessions = "4096"
session_duration_ms = "100"
poll_interval_ms = "10"
prefill_per_key = "32"
prefill_concurrency = "16"
warmup_secs = "30"
num_writer_tasks = "4"

# --- 1M keys: 0.005 arrivals/s/key -> ~5K/s aggregate writes ---
[[params.follow]]
key_cardinality = "1000000"
key_length = "16"
value_size = "128"
page_size = "32"
arrival_rate_per_key = "0.005"
session_rate = "1000.0"
max_active_sessions = "4096"
session_duration_ms = "100"
poll_interval_ms = "10"
prefill_per_key = "16"
prefill_concurrency = "16"
warmup_secs = "300"
num_writer_tasks = "4"
