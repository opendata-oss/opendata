# Deep per-key histories measured after a compaction settle window, with
# segment sealing enabled so sealed segments consolidate into dense sorted
# runs. Each cell measures BOTH scan paths (range and prefix) interleaved
# over the same store, so the comparison is not confounded by run-to-run
# LSM shape variance.
#
#   cargo run --release -p log-bench -- -b scan -c log/bench/configs/scan-deep-settled.toml -d 120

[data.storage]
type = "SlateDb"
path = "bench-data"
settings_path = "log/bench/configs/slatedb-small-sst.toml"

[data.storage.object_store]
type = "Local"
path = "/tmp/opendata-scan-bench"

[[params.scan]]
num_keys = "2000"
entries_per_key = "1000"
value_size = "256"
flush_every = "20000"
scans = "200"
scan_lag = "5"
seal_interval_ms = "500"
settle_secs = "45"

[[params.scan]]
num_keys = "2000"
entries_per_key = "1000"
value_size = "256"
flush_every = "20000"
scans = "200"
scan_lag = "18446744073709551615"
seal_interval_ms = "500"
settle_secs = "45"
