# Smoke test for the ingest benchmark's two modes. Not a real scenario — just
# enough to exercise the closed-loop and open-loop paths at two cardinalities.
#
#   cargo run -p log-bench --release -- \
#       --config log/bench/configs/ingest-smoke.toml --benchmark ingest -d 5

[data.storage]
type = "SlateDb"
path = "ingest-smoke"

[data.storage.object_store]
type = "InMemory"

# --- closed-loop saturation, 1K keys ---
[[params.ingest]]
batch_size = "100"
value_size = "128"
key_length = "16"
num_keys = "1000"
num_writer_tasks = "4"

# --- open-loop, 1K keys, offered 40 MB/s ---
[[params.ingest]]
batch_size = "100"
value_size = "128"
key_length = "16"
num_keys = "1000"
num_writer_tasks = "4"
target_mb_per_sec = "40"

# --- open-loop, 100K keys, same 40 MB/s target ---
[[params.ingest]]
batch_size = "100"
value_size = "128"
key_length = "16"
num_keys = "100000"
num_writer_tasks = "4"
target_mb_per_sec = "40"
